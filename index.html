<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的心情語錄牆 (進階版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* 輸入區域 */
        .input-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; margin-bottom: 40px; }
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 16px; resize: none; outline: none; }
        button#addBtn { width: 100%; margin-top: 10px; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button#addBtn:hover { background-color: #34495e; }

        /* 語錄牆區域 */
        #quote-wall { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1200px; }
        
        .quote-card { 
            width: 250px; min-height: 150px; background: #fff9c4; padding: 25px 20px; 
            border-radius: 2px; box-shadow: 5px 5px 10px rgba(0,0,0,0.1); 
            position: relative; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 18px; color: #333; line-height: 1.5; 
            transition: 0.3s; 
        }

        /* 刪除按鈕樣式 */
        .delete-btn {
            position: absolute; top: 5px; right: 8px;
            background: none; border: none; color: #e74c3c;
            font-size: 20px; cursor: pointer; font-weight: bold;
            opacity: 0.3; transition: 0.3s;
        }
        .quote-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { transform: scale(1.2); }

        .quote-date { position: absolute; bottom: 8px; right: 10px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

    <h1>🌿 心情語錄筆記</h1>

    <div class="input-section">
        <textarea id="quoteInput" placeholder="寫下今天的心情..."></textarea>
        <button id="addBtn" onclick="addQuote()">發布我的心情</button>
    </div>

    <div id="quote-wall"></div>

    <script>
        // 頁面載入時，先從本地儲存抓取舊資料
        window.onload = function() {
            const savedQuotes = JSON.parse(localStorage.getItem('myQuotes')) || [];
            savedQuotes.forEach(q => renderQuote(q.text, q.date, q.id));
        };

        function addQuote() {
            const input = document.getElementById('quoteInput');
            const text = input.value.trim();
            if (!text) return;

            const id = Date.now(); // 用時間當作唯一 ID
            const date = new Date().toLocaleDateString();

            // 1. 存進本地儲存
            const savedQuotes = JSON.parse(localStorage.getItem('myQuotes')) || [];
            savedQuotes.unshift({ id, text, date });
            localStorage.setItem('myQuotes', JSON.stringify(savedQuotes));

            // 2. 畫到畫面上
            renderQuote(text, date, id);
            input.value = "";
        }

        function renderQuote(text, date, id) {
            const wall = document.getElementById('quote-wall');
            const card = document.createElement('div');
            card.className = 'quote-card';
            card.setAttribute('data-id', id);
            
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteQuote(${id})">×</button>
                ${text}
                <div class="quote-date">${date}</div>
            `;
            wall.insertBefore(card, wall.firstChild);
        }

        function deleteQuote(id) {
            if (confirm("確定要刪除這條心情嗎？")) {
                // 1. 從畫面移除
                const card = document.querySelector(`[data-id="${id}"]`);
                card.remove();

                // 2. 從本地儲存移除
                let savedQuotes = JSON.parse(localStorage.getItem('myQuotes')) || [];
                savedQuotes = savedQuotes.filter(q => q.id !== id);
                localStorage.setItem('myQuotes', JSON.stringify(savedQuotes));
            }
        }
    </script>
</body>
</html>
